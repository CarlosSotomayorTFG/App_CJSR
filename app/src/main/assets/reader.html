<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lectura</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #faf8f3;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #viewer {
            position: absolute;
            top: 56px; left: 0;
            width: 100%;
            height: calc(100% - 112px);
        }

        /* Zonas de toque invisibles para pasar página */
        .tap-zone {
            position: fixed;
            top: 0;
            width: 20%;
            height: 100%;
            z-index: 10;
        }
        #tap-prev { left: 0; }
        #tap-next { right: 0; }

        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: Georgia, serif;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="loading">Cargando libro...</div>
    <div class="tap-zone" id="tap-prev"></div>
    <div class="tap-zone" id="tap-next"></div>

    <script>
        var PADDING = 56;
        var book = ePub("https://appassets.androidplatform.net/assets/book.epub");
        var rendition = book.renderTo("viewer", {
            width:  window.innerWidth,
            height: window.innerHeight - PADDING * 2,
            spread: "none",
            flow:   "paginated"
        });

        rendition.display().then(function() {
            document.getElementById("loading").style.display = "none";
        });

        // Estilos del contenido del libro
        rendition.themes.default({
            body: {
                "font-family": "Georgia, serif",
                "font-size":   "18px",
                "line-height": "1.7",
                "color":       "#2c2c2c",
                "background":  "#faf8f3",
                "padding":     "0 8px"
            }
        });

        // Redimensionar al girar el dispositivo
        window.addEventListener("resize", function() {
            rendition.resize(window.innerWidth, window.innerHeight - PADDING * 2);
        });

        // Navegación por toque en zonas laterales
        document.getElementById("tap-prev").addEventListener("click", function() {
            rendition.prev();
        });
        document.getElementById("tap-next").addEventListener("click", function() {
            rendition.next();
        });

        // Navegación por swipe
        var touchStartX = 0;
        document.addEventListener("touchstart", function(e) {
            touchStartX = e.changedTouches[0].clientX;
        });
        document.addEventListener("touchend", function(e) {
            var dx = e.changedTouches[0].clientX - touchStartX;
            if (dx < -60) rendition.next();
            if (dx >  60) rendition.prev();
        });
    </script>
</body>
</html>
